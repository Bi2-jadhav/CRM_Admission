server.port=8080
spring.application.name=API-GATEWAY

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Disable auto discovery routing
spring.cloud.gateway.discovery.locator.enabled=false

# ===== ROUTES =====

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=trainer-service
spring.cloud.gateway.routes[1].uri=lb://TRAINER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/trainer/**

spring.cloud.gateway.routes[2].id=admin-service
spring.cloud.gateway.routes[2].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.routes[3].id=counselor-service
spring.cloud.gateway.routes[3].uri=lb://COUNSELOR-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/counselor/**

spring.cloud.gateway.routes[4].id=student-service
spring.cloud.gateway.routes[4].uri=lb://STUDENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/student/**

# ===== GLOBAL CORS (CRITICAL) =====
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:5173,http://localhost:5174,http://localhost:3000
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true
